<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meow Meow 的溫暖小家 🐱🏠</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .room {
      position: relative;
      width: 90%;
      max-width: 900px;
      height: 90%;
      background: #f5f5f5;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    h1 {
      text-align: center;
      color: #555;
      margin: 20px 0;
    }
    .cat {
      position: absolute;
      bottom: 20%;
      left: 40%;
      font-size: 120px;
      animation: walk 10s infinite alternate;
    }
    @keyframes walk {
      0% { transform: translateX(-50px); }
      100% { transform: translateX(50px); }
    }
    .tv {
      position: absolute;
      bottom: 15%;
      right: 10%;
      width: 160px;
      height: 90px;
      background: #000;
      border: 8px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .tv video {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="room">
    <h1>Meow Meow 的小家 🐱</h1>
    <div class="cat">🐱</div> <!-- 之後會換成可愛貓咪圖片或動畫 -->

    <!-- 小電視：用免費測試影片，先確認能播 -->
    <div class="tv">
      <video autoplay muted loop playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        你的瀏覽器不支援影片喔～
      </video>
    </div>
  </div>

  <script>
    console.log("Meow Meow Home 已載入！開始療癒模式～ 🐱");
  </script>
</body>
</html>
